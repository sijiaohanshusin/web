<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="哈尔滨工程大学电子科技协会（HEU ESTA）官方网站，发布协会建设动态、招新信息、技术活动与组织介绍。">
    <meta name="robots" content="index,follow,max-image-preview:large">
    <link rel="canonical" href="https://heuesta.cn/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="哈尔滨工程大学电子科技协会 | HEU ESTA">
    <meta property="og:description" content="哈尔滨工程大学电子科技协会（HEU ESTA）官方网站。">
    <meta property="og:url" content="https://heuesta.cn/">
    <meta property="og:image" content="https://heuesta.cn/image_6662db.png">
    <title>哈尔滨工程大学电子科技协会 | HEU ESTA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans SC"', 'sans-serif'],
                    },
                    colors: {
                        'heu-blue': '#003366',
                        'tech-blue': '#0ea5e9',
                    }
                }
            }
        }
    </script>
    <style>
        .tech-grid-bg {
            background-image: radial-gradient(#1e293b 1px, transparent 1px);
            background-size: 40px 40px;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.3; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes progress {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(0); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body class="font-sans bg-[#0f172a] text-slate-100 min-h-screen flex flex-col items-center py-8 md:justify-center overflow-x-hidden relative">
    
    <!-- 背景装饰 -->
    <div class="absolute inset-0 tech-grid-bg opacity-20"></div>
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-10 animate-pulse-slow"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-cyan-600 rounded-full mix-blend-screen filter blur-[100px] opacity-10 animate-pulse-slow" style="animation-delay: 1.5s;"></div>

    <div class="relative z-10 w-full max-w-4xl px-6 text-center">
        <!-- Logo -->
        <div class="mb-6 md:mb-10 flex justify-center drop-shadow-[0_0_20px_rgba(59,130,246,0.3)]">
            <img src="image_6662db.png" alt="HEU ESTA Logo" class="h-24 md:h-32 w-auto animate-pulse">
        </div>

        <!-- 主容器 -->
        <div class="relative p-6 md:p-12 bg-slate-900/40 backdrop-blur-xl rounded-2xl md:rounded-3xl border border-white/10 shadow-2xl overflow-hidden mb-8">
            <!-- 装饰角 -->
            <div class="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-blue-500 rounded-tl-lg opacity-50"></div>
            <div class="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-blue-500 rounded-tr-lg opacity-50"></div>
            <div class="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-blue-500 rounded-bl-lg opacity-50"></div>
            <div class="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-blue-500 rounded-br-lg opacity-50"></div>

            <h1 class="text-2xl md:text-5xl font-bold tracking-tight mb-2">
                网站建设中
            </h1>
            <div class="flex items-center justify-center gap-2 mb-6 text-blue-400 font-mono text-lg md:text-2xl">
                <span>&gt;</span>
                <span id="typing-text"></span>
                <span class="w-2 h-5 md:w-3 md:h-6 bg-blue-500 animate-pulse"></span>
            </div>

            <!-- 动态进度条 -->
            <div class="max-w-[200px] md:max-w-xs mx-auto mb-8">
                <div class="flex justify-between text-[9px] md:text-[10px] text-slate-500 uppercase tracking-widest mb-2 font-mono">
                    <span>System Booting</span>
                    <span id="progress-val">85%</span>
                </div>
                <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                    <div class="h-full bg-gradient-to-r from-blue-600 to-cyan-400 rounded-full w-[85%] animate-[progress_2s_ease-in-out_infinite]"></div>
                </div>
            </div>

            <!-- 备案状态 -->
            <div class="flex flex-col sm:flex-row items-center justify-center gap-3 sm:gap-6 text-xs md:text-sm">
                <div class="flex items-center gap-2 text-green-400/80">
                    <i data-lucide="check-circle" class="w-4 h-4"></i>
                    <span>ICP备案已通过</span>
                </div>
                <div class="flex items-center gap-2 text-green-400/80">
                    <i data-lucide="shield-check" class="w-4 h-4"></i>
                    <span>公安备案已通过</span>
                </div>
            </div>
        </div>

        <!-- 简介 -->
        <p class="text-slate-400 text-xs md:text-base max-w-xl mx-auto mb-8 leading-relaxed font-light px-4">
            HEU ESTA 官方网站正在进行系统重构与内容合规性调整。<br class="hidden md:block">
            在这段“待机”时间里，技术传承从未停歇。
        </p>

        <!-- 联系方式 -->
        <div class="flex flex-col sm:flex-row justify-center gap-3 px-4">
            <a href="https://space.bilibili.com/70859324" target="_blank" class="px-6 py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full transition flex items-center justify-center gap-2 group text-xs md:text-sm">
                <i data-lucide="tv" class="w-4 h-4 text-pink-400"></i>
                <span>Bilibili 官方动态</span>
            </a>
            <button onclick="navigator.clipboard.writeText('1015304209'); alert('招新QQ群号：1015304209 已复制');" class="px-6 py-3 bg-blue-600/90 hover:bg-blue-500 text-white rounded-full shadow-lg shadow-blue-900/20 transition flex items-center justify-center gap-2 text-xs md:text-sm font-medium">
                <i data-lucide="message-circle" class="w-4 h-4"></i>
                <span>加入招新群 (1015304209)</span>
            </button>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="mt-auto py-8 w-full text-center space-y-2 relative z-10 px-6">
        <div class="text-slate-600 text-[9px] md:text-[10px] tracking-[0.2em] uppercase">
            &copy; 1995-2026 HEU ESTA. All rights reserved.
        </div>
        <div class="text-slate-500 text-[10px] md:text-xs space-y-1 sm:space-y-0 sm:space-x-4 flex flex-col sm:flex-row justify-center items-center">
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" class="hover:text-blue-400 transition-colors">
                皖ICP备2026006667号
            </a>
            <a href="https://beian.mps.gov.cn/#/query/webSearch?code=34020302000338" target="_blank" rel="noopener noreferrer" class="hover:text-blue-400 transition-colors flex items-center gap-1">
                <img src="https://beian.mps.gov.cn/web/assets/logo01.6189a29f.png" alt="公安备案图标" class="w-4 h-4">
                <span>皖公网安备 34020302000338号</span>
            </a>
        </div>
    </footer>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Typing Animation
        const text = "UNDER CONSTRUCTION";
        let i = 0;
        const typingElement = document.getElementById("typing-text");
        function type() {
            if (i < text.length) {
                typingElement.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 150);
            } else {
                setTimeout(() => {
                    typingElement.innerHTML = "";
                    i = 0;
                    type();
                }, 3000);
            }
        }
        type();
    </script>
</body>
</html>
