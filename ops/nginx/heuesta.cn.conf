# HEU ESTA 官网 nginx 配置
# 部署位置：/etc/nginx/sites-available/heuesta.cn（软链到 sites-enabled）
# 结构：/ 反代 Django(127.0.0.1:8001)；/static/ /media/ /learn/ 由 nginx 直接服务；
#       /protected/ 仅供 Django X-Accel-Redirect 内部使用（受保护资料下载）

server {
    server_name heuesta.cn;

    client_max_body_size 200m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml;
    gzip_min_length 1024;

    # ---- 静态资源（collectstatic 输出，文件名带哈希，可放心长缓存/CDN 缓存） ----
    location /static/ {
        alias /srv/heuesta/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- 资料文件禁止直链（必须走 Django 鉴权下载） ----
    location /media/resources/ {
        return 403;
    }

    # ---- 其他上传文件（轮播图、头像等，公开） ----
    location /media/ {
        alias /srv/heuesta/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ---- 受保护下载：Django 鉴权后通过 X-Accel-Redirect 交给 nginx 传输 ----
    location /protected/ {
        internal;
        alias /srv/heuesta/media/;
    }

    # ---- 电子学学习中心（纯静态） ----
    location /learn/ {
        root /srv/heuesta/site;
        index index.html;
        expires 1h;
        add_header Cache-Control "public";
    }

    location = /robots.txt {
        alias /srv/heuesta/static/robots.txt;
        access_log off;
    }
    location = /sitemap.xml {
        alias /srv/heuesta/static/sitemap.xml;
        access_log off;
    }
    location = /favicon.ico {
        alias /srv/heuesta/static/img/logo.png;
        expires 30d;
        access_log off;
    }

    # ---- 动态页面反代 Django ----
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/heuesta.cn/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/heuesta.cn/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = heuesta.cn) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name heuesta.cn;
    return 404; # managed by Certbot
}
