<div class="form-group {% if field.errors %}has-error{% endif %}">
    <label for="{{ field.id_for_label }}">{{ field.label }}{% if field.field.required %} <span class="req">*</span>{% endif %}</label>
    {{ field }}
    {% if field.help_text %}<small class="form-help">{{ field.help_text|safe }}</small>{% endif %}
    {% for error in field.errors %}<small class="form-error">{{ error }}</small>{% endfor %}
</div>
