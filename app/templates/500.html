{% load static %}
{# 500 页由 django.views.defaults.server_error 渲染，无上下文处理器可用，必须自包含 #}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 · 系统过载 | HEU ESTA</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.png' %}">
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body>
<main class="site-main">
    <section class="error-hero nf-dark">
        <div class="container nf-center">
            <p class="nf-eyebrow">// OVERLOAD</p>
            <div class="error-code" aria-hidden="true">500</div>

            <svg class="error-wave" viewBox="0 0 800 120" preserveAspectRatio="none" aria-hidden="true">
                <polyline points="0,60 120,60 132,14 144,106 156,10 168,110 180,8 192,112 204,10 216,106 228,14 240,60 800,60"
                          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round"/>
            </svg>

            <h1>系统过载</h1>
            <p class="error-sub">服务器烧了个保险丝，我们正在排查。稍等片刻再刷新；如果一直这样，欢迎到论坛告诉我们。</p>
            <div class="error-actions">
                <a class="btn btn-primary" href="/">回到首页</a>
            </div>
        </div>
    </section>
</main>
</body>
</html>
