{% extends "base.html" %}

{% block title %}修改密码 | {{ site_config.site_name_en }}{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-card">
        <h1>修改密码</h1>
        <p class="auth-sub">建议使用不少于 8 位的强密码</p>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                {% include "includes/field.html" %}
            {% endfor %}
            <button type="submit" class="btn btn-primary btn-block">确认修改</button>
        </form>
        <p class="auth-alt"><a href="{% url 'accounts:profile' %}">← 返回个人中心</a></p>
    </div>
</div>
{% endblock %}
